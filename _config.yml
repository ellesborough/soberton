# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: St. Peters Soberton Graveyard
email: ellesborough@yahoo.co.uk
description: >- # this means to ignore newlines until "baseurl:"
  Documentation for the graves and people commemorated in the graveyard of St. Peter's Soberton, Hampshire, England

baseurl: "/soberton" # the subpath of your site, e.g. /blog
url: "https://ellesborough.github.io/soberton" # the base hostname & protocol for your site, e.g. http://example.com


map_layers:
  - url:         'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    name:        'OpenStreetMap'

  - url:         'https://api.maptiler.com/maps/base-v4/{z}/{x}/{y}.png?key=AlW4snHg6XaxW6s5eDpV'
    attribution: '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>'
    name:        'MapTiler - Base'

  - url:         'https://api.maptiler.com/maps/hybrid-v4/{z}/{x}/{y}.jpg?key=AlW4snHg6XaxW6s5eDpV'
    attribution: '<a href="https://www.maptiler.com/copyright/" target="_blank">&copy; MapTiler</a> <a href="https://www.openstreetmap.org/copyright" target="_blank">&copy; OpenStreetMap contributors</a>'
    name:        'MapTiler - Satellite Hybrid'

# https://stackoverflow.com/questions/35487887/how-to-add-satellite-view-in-leaflet
  - url:         'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
    name:        'ArcGIS - World Imagery'

panorama_path: '/assets/panorama'
panorama_marker_icon: 'cemetery-yellow-512.png'

# Build settings
theme: minima

minima:
 hide_site_feed_link: true

collections:
  people:
    output: true
    sort_by: family_name
  graves:
    output: true
    sort_by: title
  districts:
    output: true
    sort_by: title
  markers:
    output: true
    sort_by: title
  panorama:
    output: true
    sort_by: title

defaults:
  - scope:
      path: ""
      type: "people"
    values:
      layout: "people"
  - scope:
      path: ""
      type: "graves"
    values:
      layout: "graves"
  - scope:
      path: ""
      type: "districts"
    values:
      layout: "districts"
  - scope:
      path: ""
      type: "markers"
    values:
      layout: "markers"
  - scope:
      path: ""
      type: "panorama"
    values:
      layout: "panorama"

# plugins:
#  - jekyll-feed

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
exclude:
  - import/
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
  - Gemfile
  - Gemfile.lock
  - README.md
  - feed.xml
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
